# You must declare these so they match the Policy's allowed stages
stages:
  - test
  - deploy

# This job should now appear because it uses an approved stage
register-flow:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/cli:latest
  script:
    - echo "Syncing flows to the Catalog..."
    - glab ai catalog sync --file catalog.json
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always