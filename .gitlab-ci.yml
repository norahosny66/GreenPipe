# ⚠️ Deliberately wasteful pipeline — used to demonstrate GreenPipe analysis
# This pipeline contains 13 common anti-patterns that GreenPipe will detect

stages:
  - build
  - test
  - lint
  - security
  - deploy

build:
  stage: build
  image: ubuntu:latest
  script:
    - apt-get update && apt-get install -y nodejs npm
    - npm install
    - npm run build || echo "No build script, skipping"
  artifacts:
    paths:
      - node_modules/
      - dist/

test:
  stage: test
  image: ubuntu:latest
  script:
    - apt-get update && apt-get install -y nodejs npm
    - npm install
    - npm test || echo "No tests yet, skipping"

lint:
  stage: lint
  image: ubuntu:latest
  script:
    - apt-get update && apt-get install -y nodejs npm
    - npm install
    - npx eslint . || echo "No lint config, skipping"

security_scan:
  stage: security
  image: ubuntu:latest
  script:
    - apt-get update && apt-get install -y nodejs npm
    - npm install
    - npm audit || true

deploy:
  stage: deploy
  image: ubuntu:latest
  script:
    - echo "Simulating deployment..."
    - sleep 20
    - echo "Deployed!"
