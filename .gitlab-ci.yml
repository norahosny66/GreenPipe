stages:
  - Build and test
  - Build
  - Deploy
  - Review

variables:
  GIT_DEPTH: 10

.npm_cache_template: &npm_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/
    policy: pull

Frontend unit test:
  stage: Build and test
  image: node:20-alpine3.20
  <<: *npm_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/
    policy: pull-push
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run testtofile
  coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/
  artifacts:
    reports:
      junit: ./junit.xml
      coverage_report:
        coverage_format: cobertura
        path: ./coverage/cobertura-coverage.xml
    expire_in: 1 week
  timeout: 15 minutes
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

Frontend lint check:
  stage: Build and test
  image: node:20-alpine3.20
  <<: *npm_cache
  needs:
    - Frontend unit test
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint
  timeout: 10 minutes
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

Frontend image build:
  stage: Build and test
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - export NORMALIZED_BRANCH=$(echo $CI_COMMIT_BRANCH | sed -e 's/[^[:alnum:]]//g' | cut -c -29)
    - echo $NORMALIZED_BRANCH
    - echo NORMALIZED_BRANCH=$NORMALIZED_BRANCH > build.env
    - cat build.env
    - >-
      /kaniko/executor
      --context "."
      --dockerfile "./dockerfile"
      --destination docker-registry-emotoagh-service.default/front:$NORMALIZED_BRANCH
      --skip-tls-verify
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1 week
  timeout: 15 minutes
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

Prepare frontend review deploy:
  stage: Review
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "master" && $CI_COMMIT_BRANCH != "dev"
  needs:
    - job: Frontend image build
      artifacts: true
  variables:
    NORMALIZED_BRANCH: f-$NORMALIZED_BRANCH
    FRONTEND_IMAGE: front:$NORMALIZED_BRANCH
    UPSTREAM_BRANCH: $CI_COMMIT_BRANCH
  trigger: 
    project: spectrumagh/webappteam/deployments-WebApp
    branch: dev

Dev build:
  stage: Build
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  needs:
    - Frontend unit test
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - >-
      /kaniko/executor
      --context "."
      --dockerfile "./dockerfile"
      --destination docker-registry-emotoagh-service.default/front:dev
      --skip-tls-verify
  timeout: 15 minutes
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

Dev deploy trigger:
  stage: Deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  needs:
    - Dev build
  variables:
    UPSTREAM_BRANCH: $CI_COMMIT_BRANCH
  trigger: 
    strategy: depend
    project: spectrumagh/webappteam/deployments-WebApp
    branch: dev

Production build:
  stage: Build
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - Frontend unit test
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - >-
      /kaniko/executor
      --context "."
      --dockerfile "./dockerfile"
      --destination docker-registry-emotoagh-service.default/front:$CI_COMMIT_TAG
      --destination docker-registry-emotoagh-service.default/front
      --skip-tls-verify
  timeout: 15 minutes
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

Production deploy trigger:
  stage: Deploy
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - Production build
  trigger: 
    strategy: depend
    project: spectrumagh/webappteam/deployments-WebApp
    branch: master
