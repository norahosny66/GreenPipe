# GreenPipe Project CI/CD Pipeline - OPTIMIZED
# Optimized by GreenPipe AI - SCI reduction: 38%

stages:
  - analysis
  - install
  - lint
  - test
  - build
  - deploy

# Global defaults for all jobs
default:
  interruptible: true
  timeout: 30m
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  GIT_DEPTH: 1
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"

# ════════════════════════════════════════════════════════════
# GreenPipe Dataset Analysis Job
# Runs the stats script and stores benchmarks as artifacts
# ════════════════════════════════════════════════════════════

greenpipe_stats:
  stage: analysis
  image: python:3.11-alpine
  before_script:
    - pip install pyyaml --quiet
  script:
    - python3 scripts/generate_dataset_stats.py --dataset dataset/
    - echo "=== Dataset Benchmarks ==="
    - cat dataset/dataset_benchmarks.json
    - echo ""
    - echo "=== SCI Distribution ==="
    - head -30 dataset/batch_analysis_results.csv
  artifacts:
    paths:
      - dataset/dataset_stats.yml
      - dataset/dataset_benchmarks.json
      - dataset/batch_analysis_results.csv
    expire_in: 30 days
  rules:
    - changes:
        - dataset/**/*
        - scripts/generate_dataset_stats.py
    - when: manual
      allow_failure: true
  cache:
    key: greenpipe-pip
    paths:
      - .cache/pip

# ════════════════════════════════════════════════════════════
# OPTIMIZED PIPELINE
# ════════════════════════════════════════════════════════════

install_dependencies:
  stage: install
  image: node:20-alpine
  before_script:
    - apk add --no-cache python3 py3-pip curl
  script:
    - npm ci --prefer-offline
    - pip install -r requirements.txt
  artifacts:
    paths:
      - node_modules/
      - .venv/
    expire_in: 1 day
  cache:
    key: 
      files:
        - package-lock.json
        - requirements.txt
    paths:
      - .cache/npm
      - .cache/pip
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

lint_code:
  stage: lint
  image: node:20-alpine
  needs: ["install_dependencies"]
  script:
    - npm run lint
  cache:
    key: 
      files:
        - package-lock.json
    paths:
      - .cache/npm
    policy: pull
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

lint_python:
  stage: lint
  image: python:3.11-alpine
  needs: []
  before_script:
    - pip install flake8 black
  script:
    - flake8 src/
    - black --check src/
  cache:
    key: lint-python-pip
    paths:
      - .cache/pip
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

run_unit_tests:
  stage: test
  image: node:20-alpine
  needs: ["install_dependencies"]
  script:
    - npm test
  cache:
    key: 
      files:
        - package-lock.json
    paths:
      - .cache/npm
    policy: pull
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

run_integration_tests:
  stage: test
  image: node:20-alpine
  needs: ["install_dependencies"]
  before_script:
    - apk add --no-cache python3
  script:
    - npm run test:integration
  cache:
    key: 
      files:
        - package-lock.json
    paths:
      - .cache/npm
    policy: pull
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

run_e2e_tests:
  stage: test
  image: node:20-alpine
  needs: ["install_dependencies"]
  before_script:
    - apk add --no-cache docker-cli
  script:
    - npm run test:e2e
  cache:
    key: 
      files:
        - package-lock.json
    paths:
      - .cache/npm
    policy: pull
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build_app:
  stage: build
  image: docker:27-alpine
  services:
    - docker:27-dind
  needs: ["run_unit_tests", "run_integration_tests"]
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build_docs:
  stage: build
  image: python:3.11-alpine
  needs: []
  before_script:
    - pip install mkdocs
  script:
    - mkdocs build
  artifacts:
    paths:
      - site/
    expire_in: 7 days
  cache:
    key: docs-pip
    paths:
      - .cache/pip
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy_staging:
  stage: deploy
  image: alpine:3.19
  needs: ["build_app"]
  before_script:
    - apk add --no-cache curl
  script:
    - curl -X POST https://staging.example.com/deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

deploy_production:
  stage: deploy
  image: alpine:3.19
  needs: ["build_app"]
  before_script:
    - apk add --no-cache curl
  script:
    - curl -X POST https://production.example.com/deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
