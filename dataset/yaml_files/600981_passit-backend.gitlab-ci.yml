image: docker:stable
variables:
  UV_VERSION: 0.8
  BASE_LAYER: trixie
  UV_SYSTEM_PYTHON: "true"
  UV_PYTHON_DOWNLOADS: "never"
  UV_PROJECT_ENVIRONMENT: "/usr/local"
  UV_CACHE_DIR: ".uv-cache"
  PYTHON_VERSION: "3.12"
  PROJECT_NAME: passit
  IMAGE_NAME: ${CI_REGISTRY_IMAGE}
  PIP_DISABLE_PIP_VERSION_CHECK: "on"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POSTGRES_HOST_AUTH_METHOD: "trust"
services:
  - docker:27-dind

stages:
  - test
  - deploy
  - trigger

build:
  stage: test
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
    - docker build -t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME//\//-} --build-arg IGNORE_DEV_DEPS=true .
    - docker push ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME//\//-}
  only:
    - master
    - staging
    - dev
    - tags

test:
  stage: test
  image: ghcr.io/astral-sh/uv:$UV_VERSION-python$PYTHON_VERSION-$BASE_LAYER
  services:
    - postgres:17
  cache:
    key:
      files:
        - uv.lock
    paths:
      - $UV_CACHE_DIR
  script:
    - apt-get update && apt-get install -y gcc libsasl2-dev libldap2-dev libsodium-dev
    - uv sync --frozen --no-install-project --all-extras
    - uv run ./manage.py test
    - uv cache prune --ci
  variables:
    SECRET_KEY: justtesting
    DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres
    EMAIL_CONFIRMATION_HOST: http://localhost:8000
    EMAIL_BACKEND: "django.core.mail.backends.console.EmailBackend"
    IS_TEST_MODE: "True"
    IS_PRIVATE_ORG_MODE: "False"
    PRIVATE_ORG_MODE_DOMAIN_WHITELIST: "example.com"

tag_prod:
  stage: deploy
  environment: prod
  only:
    - master
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
    - docker pull ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME//\//-}
    - docker tag ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME//\//-} ${IMAGE_NAME}:latest
    - docker push ${IMAGE_NAME}:latest

tag_staging:
  stage: deploy
  environment: staging
  only:
    - staging
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
    - docker pull ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME//\//-}
    - docker tag ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME//\//-} ${IMAGE_NAME}:staging
    - docker push ${IMAGE_NAME}:staging

tag_dev:
  stage: deploy
  environment: dev
  only:
    - dev
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
    - docker pull ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME//\//-}
    - docker tag ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME//\//-} ${IMAGE_NAME}:dev
    - docker push ${IMAGE_NAME}:dev

trigger:
  stage: trigger
  only:
    - master
  script:
    - apk add --no-cache curl
    - "curl -X POST -F token=$TRIGGER_TOKEN -F ref=master https://gitlab.com/api/v4/projects/1543637/trigger/pipeline"
