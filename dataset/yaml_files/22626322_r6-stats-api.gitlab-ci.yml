image: registry.gitlab.com/rays3t/build-image-ubuntu-jdk11-git-docker

stages:
  - build
  - test
  - visualize
  - package
  - deploy

# Disable the Gradle daemon for Continuous Integration servers as correctness
# is usually a priority over speed in CI environments. Using a fresh
# runtime for each build is more reliable since the runtime is completely
# isolated from any previous builds.
variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  JACOCO_CSV_LOCATION: '$CI_PROJECT_DIR/build/reports/jacoco/test/jacocoTestReport.csv'

before_script:
  - export GRADLE_USER_HOME=`pwd`/.gradle

include:
  template: Dependency-Scanning.gitlab-ci.yml

build:
  stage: build
  script: ./gradlew --build-cache assemble bootJar
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle
      - gradle
  artifacts:
    paths:
      - build/libs/

test:
  stage: test
  script:
  - ./gradlew --build-cache test jacocoTestReport
  - awk -F"," '{ instructions += $4 + $5; covered += $5 } END { print covered, "/", instructions, " instructions covered"; print 100*covered/instructions, "% covered" }' $JACOCO_CSV_LOCATION
  variables:
    TEST_UBI_USERNAME: ${TEST_UBI_USERNAME}
    TEST_UBI_PASSWORD: ${TEST_UBI_PASSWORD}
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: pull
    paths:
      - build
      - .gradle
      - gradle
  artifacts:
    reports:
      junit: build/test-results/test/**/TEST-*.xml
    paths:
      - build/test-results/
      - build/reports/jacoco/test/jacocoTestReport.xml
  except:
    - tags

coverage-jdk11:
  # Must be in a stage later than test-jdk11's stage.
  # The `visualize` stage does not exist by default.
  # Please define it first, or chose an existing stage like `deploy`.
  stage: visualize
  image: registry.gitlab.com/haynes/jacoco2cobertura:1.0.7
  script:
    # convert report from jacoco to cobertura
    - 'python /opt/cover2cover.py build/reports/jacoco/test/jacocoTestReport.xml src/main/java > cobertura.xml'
    # read the <source></source> tag and prepend the path to every filename attribute
    - 'python /opt/source2filename.py cobertura.xml'
  needs: ["test"]
  dependencies:
    - test
  artifacts:
    reports:
      cobertura: cobertura.xml
  except:
    - tags

publish:
  stage: deploy
  dependencies:
    - build
  needs: ["build"]
  script:
    - ./gradlew jar publish
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: pull
    paths:
      - .gradle
      - gradle
  only:
    - master
    - /^release-v.*$/



create-gitlab-release:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli
  when: manual
  only:
    # Only for release tags
    - /^release-v.*$/
  script:
    - >
      release-cli create --name release-branch-$CI_JOB_ID --description release-branch-$CI_COMMIT_REF_NAME-$CI_JOB_ID
      --tag-name job-$CI_JOB_ID --ref $CI_COMMIT_SHA
      --assets-link '{"name":"Package","url":"https://gitlab.com/siege-insights/r6-stats-api/-/packages","link_type":"other"}'
