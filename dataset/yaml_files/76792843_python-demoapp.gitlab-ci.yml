variables:
            IMAGE_NAME: ryanhdocker97/demo-app
            IMAGE_TAG: python-app-1.0

stages:
    - tests
    - build
    - deploy

run_tests: 
    stage: tests
    image: 
        python:3.15.0a2-slim-trixie
    before_script:
        - apt-get update && apt-get install -y gcc python3-dev git make
    script:
        - make test

build_docker_image:
    stage: build
    image:
        docker:29.1.1
    services:
        - docker:29.1.1-dind
    variables:
        DOCKER_TLS_CERTDIR: "/certs"
    before_script:
        - docker login -u $REGISTRY_USER -p $REGISTRY_PASS
    script:
        - docker build -t $IMAGE_NAME:$IMAGE_TAG .
        - docker push $IMAGE_NAME:$IMAGE_TAG

deploy_to_instance:
    stage: deploy
    before_script:
        - chmod 400 $SSH_KEY 
    script:
        - ssh -o StrictHostKeyChecking=no -i $SSH_PRIVATE_KEY root@161.35.223.117"docker login -u $REGISTRY_USER -p $REGISTRY_PASS &&
         docker ps -aq | xargs docker stop | xarg docker rm &&
         docker run -d -p 5000:5000 $IMAGE_NAME:$IMAGE_TAG"


    


