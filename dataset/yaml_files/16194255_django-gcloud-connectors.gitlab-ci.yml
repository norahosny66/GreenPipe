stages:
  - test
  - deploy
  - build
  - publish

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: "$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH"
    - if: "$CI_COMMIT_TAG"

.gcloud_init: &gcloud_init
  - gcloud auth activate-service-account --key-file $SERVICE_ACCOUNT_KEY
  - gcloud config set project $PROJECT_ID

.gcloud_app_credentials: &gcloud_app_credentials
  - export GOOGLE_APPLICATION_CREDENTIALS=$SERVICE_ACCOUNT_KEY

# Every time the indexes changes push them to our project's base job
.deploy-indexes:
  image: registry.gitlab.com/potato-oss/google-cloud/django-gcloud-connectors/python310:latest
  stage: deploy
  before_script:
    - *gcloud_init
  script: gcloud app deploy .datastore/WEB-INF/index.yaml
  rules:
    - changes:
        - .datastore/WEB-INF/index.yaml

deploy-indexes-optimistic:
  extends: .deploy-indexes
  variables:
    SERVICE_ACCOUNT_KEY: $OPTIMISTIC_PROJECT_SERVICE_ACCOUNT_KEY
    PROJECT_ID: $OPTIMISTIC_PROJECT_ID

deploy-indexes-pessimistic:
  extends: .deploy-indexes
  variables:
    SERVICE_ACCOUNT_KEY: $PESSIMISTIC_PROJECT_SERVICE_ACCOUNT_KEY
    PROJECT_ID: $PESSIMISTIC_PROJECT_ID

# Base job to run real datastore tests
.python310-42-real-datastore-base:
  image: registry.gitlab.com/potato-oss/google-cloud/django-gcloud-connectors/python310:latest
  stage: test
  timeout: 2h
  before_script:
    - mkdir .reports
    - SERVICE_ACCOUNT_KEY=$OPTIMISTIC_PROJECT_SERVICE_ACCOUNT_KEY
    - PROJECT_ID=$OPTIMISTIC_PROJECT_ID
    - *gcloud_app_credentials
  script: GCLOUDC_PROJECT_ID=$PROJECT_ID tox -e py310-42 -- --settings=settings.test_settings --use-remote-datastore
  artifacts:
    reports:
      junit: .reports/django-tests.xml

# Base job to run real datastore on project with concurrrency set to optimistic
.python310-42-real-datastore-optimistic-base:
  extends: .python310-42-real-datastore-base
  variables:
    SERVICE_ACCOUNT_KEY: $OPTIMISTIC_PROJECT_SERVICE_ACCOUNT_KEY
    PROJECT_ID: $OPTIMISTIC_PROJECT_ID

# Base job to run real datastore on project with concurrrency set to pessimistic
.python310-42-real-datastore-pessimistic-base:
  extends: .python310-42-real-datastore-base
  variables:
    SERVICE_ACCOUNT_KEY: $PESSIMISTIC_PROJECT_SERVICE_ACCOUNT_KEY
    PROJECT_ID: $PESSIMISTIC_PROJECT_ID

python310-42-real-datastore-optimistic-manual:
  extends: .python310-42-real-datastore-optimistic-base
  when: manual

python310-42-real-datastore-pessimistic-manual:
  extends: .python310-42-real-datastore-pessimistic-base
  when: manual

python310-42:
