python312-djangae:
  allow_failure: true
  image: registry.gitlab.com/potato-oss/google-cloud/django-gcloud-connectors/python312:latest
  stage: test
  before_script:
    - mkdir .reports
    - git clone https://gitlab.com/potato-oss/djangae/djangae.git
  script:
    - cd djangae
    # Hack. We want to setup the tox env, so we just print the help
    - tox -e py312-42 -- --help
    - source .tox/py312-42/bin/activate # Active the venv and install this version of cloud connectors
    - pip uninstall -y django-gcloud-connectors
    - pip install git+https://gitlab.com/potato-oss/google-cloud/django-gcloud-connectors.git@$CI_COMMIT_SHA
    - tox -e py312-42 -- --settings=settings.test_settings # Run the Djangae tests properly
  artifacts:
    reports:
      junit: .reports/djangae-tests.xml

test-docs:
  image: python:3.9
  stage: test
  needs: [] # We can execute this out-of-order
  before_script:
    - pip install mkdocs>=1.1.2
  script:
    - mkdir -p test
    - mkdocs build --strict --verbose --site-dir test
  artifacts:
    paths:
      - test
  except:
    - master

flake8:
  image: registry.gitlab.com/potato-oss/google-cloud/django-gcloud-connectors/python310:latest
  before_script:
    - mkdir .reports
  script: tox -e flake8 -- --format junit-xml --output-file=".reports/flake8.xml"
  artifacts:
    reports:
      junit: .reports/flake8.xml

build and test-publish:
  stage: build
  image: python:3.10
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - pip install twine setuptools wheel
    - rm -rf dist
    - python setup.py sdist bdist_wheel
  script:
    - python -m twine upload --repository-url https://test.pypi.org/legacy/ dist/*
  artifacts:
    paths:
      - dist
  variables:
    TWINE_PASSWORD: $TEST_PYPI_TOKEN
    TWINE_USERNAME: __token__

publish to prod pypi:
  stage: publish
  dependencies: ["build and test-publish"]
  needs: ["build and test-publish"]
  when: manual
  image: python:3.10
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - pip install twine
  script:
    - python -m twine upload --repository-url https://upload.pypi.org/legacy/ dist/*
  variables:
    TWINE_PASSWORD: $PROD_PYPI_TOKEN
    TWINE_USERNAME: __token__

pages:
  image: python:3.9
  stage: publish
  needs: []
  before_script:
    - pip install mkdocs>=1.1.2
  script:
    - mkdir -p public
    - mkdocs build --strict --verbose
  artifacts:
    paths:
      - public
  only:
    - master
