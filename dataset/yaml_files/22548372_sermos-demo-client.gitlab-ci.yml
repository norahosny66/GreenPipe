# Change pip's cache directory to be inside the project directory since we can
# only cache local items.
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

stages:
  - test
  - upload-package
  - build
  - deploy

# Use the sermos-tools base image to run through test suite.
# Run on every branch except `buildimage`.
test:
  stage: test
  image: registry.gitlab.com/sermos/sermos-demo-client:latest
  script:
    - echo "Testing Sermos Demo Client ..."
    - pip install -e .[test-ci,build]
    - tox # Run test suite
    - python setup.py sdist bdist_wheel # Build package
  artifacts:
    paths:
      - dist/ # Make package available to subsequent jobs

# Upload built package from test in dist/
# When this is a versioned tag.
upload-package:
  stage: upload-package
  image: python:3.7-slim
  only:
    - /^\d+\.\d+\.\d+.*/
  script:
    - echo "Uploading Sermos Demo Client to Gitlab PyPI..."
    - pip install -e .[build]
    - TWINE_PASSWORD=${CI_JOB_TOKEN} TWINE_USERNAME=gitlab-ci-token python -m twine upload --skip-existing --repository-url https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/pypi dist/*
  artifacts:
    paths:
      - dist/

# Build staging image on release branches
build-staging:
  stage: build
  image: docker:19.03.12
  only:
    - /^release\/.*$/
  services:
    - docker:19.03.12-dind
  variables:
    # Use TLS https://docs.gitlab.com/ee/ci/docker/using_docker_build.html#tls-enabled
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $CI_REGISTRY_IMAGE:latest || true # For layer reuse
    - /bin/sh ./docker/build-image.sh -d -n $CI_REGISTRY_IMAGE -t $CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  artifacts:
    paths:
      - dist/

# Build production image on versioned branches
build-production:
  stage: build
  image: docker:19.03.12
  only:
    - /^\d+\.\d+\.\d+.*/
  services:
    - docker:19.03.12-dind
  variables:
    # Use TLS https://docs.gitlab.com/ee/ci/docker/using_docker_build.html#tls-enabled
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $CI_REGISTRY_IMAGE:latest || true # For layer reuse
    - /bin/sh ./docker/build-image.sh -n $CI_REGISTRY_IMAGE -v $CI_COMMIT_TAG -p $CI_JOB_TOKEN -i $CI_PROJECT_ID
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    - docker push $CI_REGISTRY_IMAGE:latest
  artifacts:
    paths:
      - dist/

deploy-staging:
  stage: deploy
  image: python:3.7-slim
  only:
    - /^release\/.*$/
  script:
    - pip install -e .[deploy]
    - apt-get update && apt-get install -y wget git
    - wget -O /usr/local/bin/sops https://github.com/mozilla/sops/releases/download/v3.5.0/sops-v3.5.0.linux && chmod +x /usr/local/bin/sops
    - ./bin/set_aws_credentials.sh
    - echo "Deploying to Staging ..."
    - echo "Ensure the Sermos Cloud Staging version you want to test against is set to the `staging` branch ..."
    - honcho run -e <(sops -d ./secrets/sermos-demo-staging.env) sermos deploy --deploy-branch staging

deploy-production:
  stage: deploy
  image: python:3.7-slim
  only:
    - /^\d+\.\d+\.\d+.*/
  script:
    - pip install -e .[deploy]
    - apt-get update && apt-get install -y wget git
    - wget -O /usr/local/bin/sops https://github.com/mozilla/sops/releases/download/v3.5.0/sops-v3.5.0.linux && chmod +x /usr/local/bin/sops
    - ./bin/set_aws_credentials.sh
    - echo "Deploying to Production ..."
    - honcho run -e <(sops -d ./secrets/sermos-demo.env) sermos deploy
