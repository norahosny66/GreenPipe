stages: [build, test, release]

build-pipeline:
  stage: build
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'
  script: echo "Testing pipeline in MR"


create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    # Only create releases for production tags (not dev/rc/alpha/beta)
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_TAG !~ /^(dev|rc|alpha|beta)-/'
  script: echo "Creating release for DS Pipeline with $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG of components repository $CI_PROJECT_PATH"