stages:
  - build
  - publish
  - prod

default:
  image: docker:18.09
  services:
    - docker:18.09-dind

variables:
  DOCKER_HOST: tcp://localhost:2375
  DOCKER_DRIVER: overlay2

build:
  stage: build
  tags:
    - kubernetes
  variables:
    IMAGE: $CI_REGISTRY_IMAGE
    BUILD_TAG: build
    RELEASE_TAG: candidate
  before_script:
    - apk update && apk add make
    - echo -n $CI_JOB_TOKEN | docker login -u gitlab-ci-token --password-stdin $CI_REGISTRY
  script:
    # Pull the images we will use with docker build --cache-from
    # (|| true so we don't fail if the image isn't there)
    - docker pull $IMAGE:$BUILD_TAG || true
    - docker pull $IMAGE:$RELEASE_TAG || true
    # build "$BUILD_TAG" and "$RELEASE-TAG" images
    # and execute commit stage tests
    - make build
    # publish the "$RELEASE-TAG" image + a tag with the commit sha
    - docker tag $IMAGE:$RELEASE_TAG $IMAGE:$CI_COMMIT_SHA
    - docker push $IMAGE:$CI_COMMIT_SHA
    - docker push $IMAGE:$RELEASE_TAG
    # publish the $BUILD_TAG" image + a tag with the commit sha
    - docker tag $IMAGE:$BUILD_TAG $IMAGE:$CI_COMMIT_SHA.$BUILD_TAG
    - docker push $IMAGE:$CI_COMMIT_SHA.$BUILD_TAG
    - docker push $IMAGE:$BUILD_TAG
  artifacts:
    name: "${CI_JOB_NAME}_${CI_COMMIT_REF_NAME}"
    paths:
      - reports/
    reports:
      junit: reports/unittest.xml
  coverage: '/All files\s*\|\s*([0-9.]+)/'

# When the master branch changes (and only then), tag the commit's image with 'latest' and push it
publish:
  stage: publish
  only:
    - master
  tags:
    - kubernetes
  variables:
    GIT_STRATEGY: none
  before_script:
    - echo -n $CI_JOB_TOKEN | docker login -u gitlab-ci-token --password-stdin $CI_REGISTRY
  dependencies: []
  script:
    - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest

package chart:
  stage: build
  tags:
    - kubernetes
  image: alpine/helm:2.14.3
  services: []
  variables:
    APP_VERSION: 1.0.$CI_PIPELINE_IID
  before_script:
    - apk update && apk add make bash
  script:
    - make pack-chart
  artifacts:
    paths:
      - hello-*.tgz

deploy:
  stage: prod
  only:
    - master
  tags:
    - kubernetes
  image: devth/helm:v2.14.3
  services: []
  variables:
    STAGE: prod
    APP_VERSION: $CI_COMMIT_SHA
  before_script:
    - apk update && apk add make
    - chmod +x ./abin/init-helm.sh
    - ./abin/init-helm.sh
  script:
    - make deploy
