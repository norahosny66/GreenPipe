variables:
  CI_APPLICATION_REPOSITORY: $CI_REGISTRY_IMAGE/commits
  CI_APPLICATION_TAG: $CI_COMMIT_SHA
  CI_CACHE_REPOSITORY: $CI_REGISTRY_IMAGE/cache
  CI_RELEASE_PASSWORD: $CI_REGISTRY_PASSWORD
  CI_RELEASE_REGISTRY: $CI_REGISTRY
  CI_RELEASE_REPOSITORY: $CI_REGISTRY_IMAGE
  CI_RELEASE_USER: $CI_REGISTRY_USER

stages:
  - build
  - release
  - review
  - staging
  - canary
  - production
  - incremental rollout 10%
  - incremental rollout 25%
  - incremental rollout 50%
  - incremental rollout 100%
  - cleanup

include:
  - template: Jobs/Deploy.gitlab-ci.yml # https://gitlab.com/gitlab-org/gitlab/blob/master/lib/gitlab/ci/templates/Jobs/Deploy.gitlab-ci.yml

review:
  needs: ["build"]

build:
  stage: build
  interruptible: true
  image: quay.io/containers/podman:v4
  script:
    - podman login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - >-
      podman build
      --cache-from=$CI_CACHE_REPOSITORY
      --cache-to=$CI_CACHE_REPOSITORY
      --pull=newer
      --tag "$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG"
      .
    - podman push "$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG"
  rules:
    - if: "$CI_COMMIT_TAG || $CI_COMMIT_BRANCH"

release-latest:
  stage: release
  resource_group: release-latest
  image: quay.io/containers/podman:v4
  variables:
    GIT_STRATEGY: none
  script:
    - podman login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - podman login -u "$CI_RELEASE_USER" -p "$CI_RELEASE_PASSWORD" "$CI_RELEASE_REGISTRY"
    - podman pull "$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG"
    - podman tag "$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG" "$CI_RELEASE_REPOSITORY:latest"
    - podman push "$CI_RELEASE_REPOSITORY:latest"
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"

release-tag:
  stage: release
  resource_group: "release-tag-$CI_COMMIT_TAG"
  image: quay.io/containers/podman:v4
  variables:
    GIT_STRATEGY: none
  script:
    - podman login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - podman login -u "$CI_RELEASE_USER" -p "$CI_RELEASE_PASSWORD" "$CI_RELEASE_REGISTRY"
    - podman pull "$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG"
    - podman tag "$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG" "$CI_RELEASE_REPOSITORY:$CI_COMMIT_TAG"
    - podman push "$CI_RELEASE_REPOSITORY:$CI_COMMIT_TAG"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[\d.]+$/'
