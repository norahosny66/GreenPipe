build_win10_vs2017:
  stage: build
  only:
    - master
    - merge_request
  script:
    - C:\Windows\system32\cmd.exe /k "C:\Program Files (x86)\Microsoft Visual Studio\2017\Community\VC\Auxiliary\Build\vcvars64.bat"
    - mkdir build
    - cd build
    - cmake ..
      -G "Visual Studio 15 2017 Win64"
      -DENABLE_TEST=YES
      -DBUILD_SHARED_LIBS=ON
    - cmake --build . --config Debug
  artifacts:
    expire_in: 1 day
    paths:
      - build
  tags:
    - win10


build_win10_vs2019:
  stage: build
  only:
    - master
    - merge_request
  script:
    - C:\Windows\system32\cmd.exe /k "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\VC\Auxiliary\Build\vcvars64.bat"
    - mkdir build
    - cd build
    - cmake .. -G "Visual Studio 16 2019" -A x64
      -DENABLE_TEST=YES
      -DBUILD_SHARED_LIBS=ON
    - cmake --build . --config Debug
  artifacts:
    expire_in: 1 day
    paths:
      - build
  tags:
    - win10


build_macos:
