build_ubuntu_18_04_gcc:
  stage: build
  only:
    - master
    - merge_request
  script:
    - mkdir build
    - cd build
    - cmake ..
      -DENABLE_TEST=YES
      -DCMAKE_C_COMPILER=gcc
      -DCMAKE_CXX_COMPILER=g++
    - make
  artifacts:
    expire_in: 1 day
    paths:
      - build
  tags:
    - ubuntu1804


build_ubuntu_20_04_gcc:
  stage: build
