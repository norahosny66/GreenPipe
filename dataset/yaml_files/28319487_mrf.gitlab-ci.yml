stages:
  - check_format
  - build
  - test
  - deploy

format:
  stage: check_format
  only:
    - master
    - merge_request
  script:
    - mkdir build_format
    - cd build_format
    - cmake ..
    - make clang-format
    - clang-format --version
    - git diff > format.patch
    - if [ -s format.patch ]; then exit 1; else echo "Format is compliant with MRF rules"; fi
  artifacts:
    when: on_failure
    expire_in: 1 day
    paths:
      - build_format/format.patch
  tags:
    - ubuntu2004

