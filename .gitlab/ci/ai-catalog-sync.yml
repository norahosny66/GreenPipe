
# This job actually TALKS to the GitLab AI Catalog API
register-flow:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/cli:latest
  script:
    - echo "Syncing flows to the Catalog..."
    - glab ai catalog sync --file catalog.json  # Replace catalog.json with your actual filename if different
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: manual  # This ensures it doesn't run automatically and mess with your current setup